<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <defs>
    <linearGradient id="flameOuter" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#E85D26"/>
      <stop offset="100%" stop-color="#FDB813"/>
    </linearGradient>
    <linearGradient id="flameInner" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#FDB813"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="bowlGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E85D26"/>
      <stop offset="100%" stop-color="#C14A1E"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1DD1A1"/>
      <stop offset="100%" stop-color="#0EA88A"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#1DD1A1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1DD1A1"/>
    </linearGradient>
    <linearGradient id="textGuru" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FDB813"/>
      <stop offset="100%" stop-color="#E85D26"/>
    </linearGradient>
    <linearGradient id="textSishya" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1DD1A1"/>
      <stop offset="100%" stop-color="#0EA88A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#E85D26" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- === ICON (scaled into ~100x100 area) === -->
  <g transform="translate(8, 5) scale(0.21)">
    <!-- Open Book -->
    <path d="M144 340 C144 310 180 290 256 280 L256 380 C180 370 144 360 144 340 Z" fill="url(#bookGrad)" opacity="0.9"/>
    <path d="M368 340 C368 310 332 290 256 280 L256 380 C332 370 368 360 368 340 Z" fill="url(#tealGrad)" opacity="0.85"/>
    <line x1="256" y1="275" x2="256" y2="385" stroke="#1DD1A1" stroke-width="2.5" opacity="0.5"/>

    <!-- Flame -->
    <g filter="url(#glow)">
      <path d="M256 100 C230 150 190 195 200 240 C208 275 230 280 240 278 C235 268 230 250 238 235 C242 225 250 230 256 245 C262 230 270 225 274 235 C282 250 277 268 272 278 C282 280 304 275 312 240 C322 195 282 150 256 100 Z" fill="url(#flameOuter)"/>
      <path d="M256 160 C242 190 222 215 228 240 C232 258 244 262 250 258 C248 250 250 240 256 248 C262 240 264 250 262 258 C268 262 280 258 284 240 C290 215 270 190 256 160 Z" fill="url(#flameInner)" opacity="0.85"/>
      <ellipse cx="256" cy="238" rx="10" ry="16" fill="white" opacity="0.5"/>
    </g>
  </g>

  <!-- === WORDMARK === -->

  <!-- "GURU" — bold, warm gradient -->
  <text
    x="125" y="50"
    font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
    font-size="38"
    font-weight="800"
    letter-spacing="5"
    fill="url(#textGuru)"
    filter="url(#softShadow)"
  >GURU</text>

  <!-- "SISHYA" — medium weight, teal gradient -->
  <text
    x="125" y="86"
    font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
    font-size="34"
    font-weight="500"
    letter-spacing="7"
    fill="url(#textSishya)"
  >SISHYA</text>

  <!-- Thin accent line -->
  <line x1="125" y1="58" x2="310" y2="58" stroke="#E85D26" stroke-width="1.5" opacity="0.3"/>

  <!-- Tagline -->
  <text
    x="125" y="104"
    font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
    font-size="9.5"
    font-weight="400"
    letter-spacing="3.5"
    fill="#777777"
  >MASTER YOUR INTERVIEWS</text>
</svg>
