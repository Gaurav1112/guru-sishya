<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Compact logo mark — guru blessing sishya -->
  <rect width="64" height="64" rx="14" fill="#0C0A15"/>

  <!-- Guru (saffron) -->
  <circle cx="22" cy="22" r="6" fill="#E85D26"/>
  <path d="M16 44 Q16 32 22 26 L28 26 Q28 32 28 44 Z" fill="#E85D26" opacity="0.9"/>
  <!-- Blessing hand -->
  <path d="M28 24 Q32 18 33 15" stroke="#FDB813" stroke-width="2" stroke-linecap="round"/>

  <!-- Blessing rays -->
  <line x1="33" y1="15" x2="38" y2="12" stroke="#FDB813" stroke-width="1" opacity="0.6"/>
  <line x1="34" y1="17" x2="40" y2="15" stroke="#FDB813" stroke-width="1" opacity="0.5"/>

  <!-- Sishya (teal) -->
  <circle cx="42" cy="26" r="5" fill="#1DD1A1"/>
  <path d="M37 48 Q37 36 42 30 L47 30 Q47 36 47 48 Z" fill="#1DD1A1" opacity="0.8"/>
  <!-- Namaste hands -->
  <path d="M39 35 Q42 32 45 35" stroke="#1DD1A1" stroke-width="2" stroke-linecap="round"/>

  <!-- Knowledge dots -->
  <circle cx="34" cy="22" r="1.5" fill="#FDB813" opacity="0.7"/>
  <circle cx="37" cy="24" r="1" fill="#FDB813" opacity="0.5"/>

  <!-- Code brackets -->
  <text x="8" y="56" font-family="monospace" font-size="10" fill="#E85D26" opacity="0.5">&lt;</text>
  <text x="50" y="56" font-family="monospace" font-size="10" fill="#E85D26" opacity="0.5">/&gt;</text>
</svg>
