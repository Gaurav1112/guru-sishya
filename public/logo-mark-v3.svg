<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <!-- Saffron to gold gradient -->
    <linearGradient id="flameGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#E85D26"/>
      <stop offset="100%" stop-color="#FDB813"/>
    </linearGradient>
    <!-- Teal glow gradient -->
    <linearGradient id="tealGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1DD1A1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1DD1A1" stop-opacity="0.8"/>
    </linearGradient>
    <!-- Subtle radial glow behind flame -->
    <radialGradient id="glowRadial" cx="50%" cy="35%" r="35%">
      <stop offset="0%" stop-color="#FDB813" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FDB813" stop-opacity="0"/>
    </radialGradient>
    <!-- Saffron to gold for diya body -->
    <linearGradient id="diyaGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E85D26"/>
      <stop offset="100%" stop-color="#C94A1A"/>
    </linearGradient>
  </defs>

  <!-- Ambient glow -->
  <circle cx="64" cy="42" r="44" fill="url(#glowRadial)"/>

  <!-- Outer sacred geometry ring — subtle mandala/chakra ring -->
  <circle cx="64" cy="64" r="58" fill="none" stroke="#E85D26" stroke-width="1.2" opacity="0.15"/>
  <!-- Decorative dots on the outer ring (8 cardinal points) -->
  <circle cx="64" cy="6" r="1.8" fill="#E85D26" opacity="0.3"/>
  <circle cx="64" cy="122" r="1.8" fill="#E85D26" opacity="0.3"/>
  <circle cx="6" cy="64" r="1.8" fill="#E85D26" opacity="0.3"/>
  <circle cx="122" cy="64" r="1.8" fill="#E85D26" opacity="0.3"/>
  <circle cx="23" cy="23" r="1.4" fill="#FDB813" opacity="0.2"/>
  <circle cx="105" cy="23" r="1.4" fill="#FDB813" opacity="0.2"/>
  <circle cx="23" cy="105" r="1.4" fill="#FDB813" opacity="0.2"/>
  <circle cx="105" cy="105" r="1.4" fill="#FDB813" opacity="0.2"/>

  <!-- Inner ring -->
  <circle cx="64" cy="64" r="46" fill="none" stroke="#FDB813" stroke-width="0.6" opacity="0.12"/>

  <!-- DIYA (oil lamp) — elegant geometric form -->
  <!-- Diya bowl — smooth symmetrical curve -->
  <path d="M38 82 Q40 72 48 68 L80 68 Q88 72 90 82 Q88 90 80 92 L48 92 Q40 90 38 82 Z"
        fill="url(#diyaGrad)" opacity="0.9"/>
  <!-- Diya inner rim highlight -->
  <path d="M44 78 Q46 73 52 70 L76 70 Q82 73 84 78"
        fill="none" stroke="#FDB813" stroke-width="0.8" opacity="0.5"/>

  <!-- Diya base/pedestal -->
  <path d="M52 92 L50 100 Q56 103 64 104 Q72 103 78 100 L76 92"
        fill="#C94A1A" opacity="0.7"/>
  <!-- Base bottom line -->
  <path d="M50 100 Q57 103 64 104 Q71 103 78 100"
        fill="none" stroke="#E85D26" stroke-width="0.6" opacity="0.4"/>

  <!-- FLAME — shaped as a code cursor/bracket blend -->
  <!-- Main flame body — tall, elegant, with a subtle < > feel -->
  <path d="M64 20
           Q72 32 72 40
           Q73 48 70 54
           Q68 60 66 64
           L64 68
           L62 64
           Q60 60 58 54
           Q55 48 56 40
           Q56 32 64 20 Z"
        fill="url(#flameGrad)"/>
  <!-- Flame inner glow -->
  <path d="M64 30
           Q68 38 68 44
           Q69 50 67 55
           L64 62
           L61 55
           Q59 50 60 44
           Q60 38 64 30 Z"
        fill="#FDB813" opacity="0.7"/>
  <!-- Flame core (white-hot center) -->
  <path d="M64 40 Q66 46 66 50 L64 56 L62 50 Q62 46 64 40 Z"
        fill="#FFECD2" opacity="0.6"/>

  <!-- CODE BRACKETS integrated into the diya — left and right -->
  <!-- Left bracket < -->
  <path d="M30 74 L22 80 L30 86"
        fill="none" stroke="#1DD1A1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <!-- Right bracket > -->
  <path d="M98 74 L106 80 L98 86"
        fill="none" stroke="#1DD1A1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

  <!-- Slash between brackets (subtle, below diya) -->
  <path d="M68 108 L60 118"
        fill="none" stroke="#1DD1A1" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Knowledge particles rising from flame -->
  <circle cx="58" cy="16" r="1.2" fill="#FDB813" opacity="0.5"/>
  <circle cx="70" cy="12" r="1" fill="#FDB813" opacity="0.4"/>
  <circle cx="64" cy="8" r="0.8" fill="#FDB813" opacity="0.3"/>
  <circle cx="56" cy="10" r="0.6" fill="#E85D26" opacity="0.3"/>
  <circle cx="72" cy="6" r="0.7" fill="#E85D26" opacity="0.25"/>
</svg>