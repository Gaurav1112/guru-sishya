<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDB813"/>
      <stop offset="100%" stop-color="#E85D26"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0EA88A"/>
      <stop offset="100%" stop-color="#1DD1A1"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E85D26"/>
      <stop offset="100%" stop-color="#1DD1A1"/>
    </linearGradient>
  </defs>

  <!--
    Concept: Two stacked chevrons inside a rounded hexagon.
    Top chevron (Guru) points down = knowledge flowing down.
    Bottom chevron (Sishya) points up = growth rising.
    They interlock at the center forming a diamond bridge.
  -->

  <!-- Guru: downward chevron (saffron/gold) -->
  <path d="M148 120 L256 228 L364 120 L364 188 L256 296 L148 188 Z" fill="url(#g1)"/>

  <!-- Sishya: upward chevron (teal) -->
  <path d="M148 392 L256 284 L364 392 L364 324 L256 216 L148 324 Z" fill="url(#g2)"/>

  <!-- Center diamond overlap highlight -->
  <path d="M216 256 L256 216 L296 256 L256 296 Z" fill="url(#g3)" opacity="0.9"/>
</svg>