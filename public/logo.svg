<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="guru" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FDB813"/>
      <stop offset="100%" stop-color="#E85D26"/>
    </linearGradient>
    <linearGradient id="sishya" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#0EA88A"/>
      <stop offset="100%" stop-color="#1DD1A1"/>
    </linearGradient>
    <linearGradient id="bridge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDB813"/>
      <stop offset="50%" stop-color="#E85D26"/>
      <stop offset="100%" stop-color="#1DD1A1"/>
    </linearGradient>
    <linearGradient id="textGuru" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FDB813"/>
      <stop offset="100%" stop-color="#E85D26"/>
    </linearGradient>
    <linearGradient id="textSishya" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E85D26"/>
      <stop offset="100%" stop-color="#1DD1A1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#E85D26" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- === ICON (in 100x100 area, centered vertically) === -->
  <g transform="translate(10, 10) scale(0.195)">
    <!-- Guru chevron -->
    <path
      d="M142 128 L256 240 L370 128 L370 184 L256 298 L142 184 Z"
      fill="url(#guru)"
      stroke="url(#guru)"
      stroke-width="4"
      stroke-linejoin="round"
    />
    <!-- Sishya chevron -->
    <path
      d="M142 384 L256 272 L370 384 L370 328 L256 214 L142 328 Z"
      fill="url(#sishya)"
      stroke="url(#sishya)"
      stroke-width="4"
      stroke-linejoin="round"
    />
    <!-- Center diamond -->
    <path
      d="M210 256 L256 210 L302 256 L256 302 Z"
      fill="url(#bridge)"
      stroke="url(#bridge)"
      stroke-width="2"
      stroke-linejoin="round"
    />
  </g>

  <!-- === WORDMARK === -->

  <!-- "GURU" — bold, warm gradient -->
  <text
    x="125" y="52"
    font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
    font-size="36"
    font-weight="800"
    letter-spacing="6"
    fill="url(#textGuru)"
    filter="url(#shadow)"
  >GURU</text>

  <!-- "SISHYA" — medium weight, cool gradient -->
  <text
    x="125" y="88"
    font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
    font-size="32"
    font-weight="500"
    letter-spacing="8"
    fill="url(#textSishya)"
  >SISHYA</text>

  <!-- Thin accent line between words -->
  <line x1="125" y1="60" x2="300" y2="60" stroke="url(#bridge)" stroke-width="1.5" opacity="0.4"/>

  <!-- Tagline -->
  <text
    x="125" y="106"
    font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
    font-size="9"
    font-weight="400"
    letter-spacing="4"
    fill="#888888"
  >MASTER YOUR INTERVIEWS</text>
</svg>
