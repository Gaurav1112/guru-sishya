<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="#0C0A15" stroke="#E85D26" stroke-width="4"/>

  <!-- Inner glow ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#FDB813" stroke-width="1" opacity="0.3"/>

  <!-- Guru figure (left, larger, blessing hand raised) -->
  <!-- Body -->
  <path d="M160 340 Q160 280 180 240 Q190 220 200 210 L200 380 Q180 380 160 370 Z" fill="#E85D26" opacity="0.9"/>
  <!-- Head -->
  <circle cx="190" cy="195" r="28" fill="#FDB813"/>
  <!-- Halo/aura behind guru -->
  <circle cx="190" cy="195" r="40" fill="none" stroke="#FDB813" stroke-width="2" opacity="0.4"/>
  <circle cx="190" cy="195" r="50" fill="none" stroke="#FDB813" stroke-width="1" opacity="0.2"/>
  <!-- Blessing hand (raised) -->
  <path d="M215 220 Q230 190 235 170 Q237 162 232 160 Q227 162 225 170 Q222 180 218 195" fill="#FDB813" stroke="#FDB813" stroke-width="2"/>
  <!-- Guru robe detail -->
  <path d="M170 260 Q185 250 200 260" fill="none" stroke="#FDB813" stroke-width="2" opacity="0.5"/>

  <!-- Blessing rays from guru's hand -->
  <line x1="235" y1="165" x2="260" y2="145" stroke="#FDB813" stroke-width="1.5" opacity="0.6"/>
  <line x1="238" y1="170" x2="268" y2="158" stroke="#FDB813" stroke-width="1.5" opacity="0.5"/>
  <line x1="237" y1="175" x2="270" y2="172" stroke="#FDB813" stroke-width="1.5" opacity="0.4"/>

  <!-- Sishya figure (right, smaller, namaste hands) -->
  <!-- Body -->
  <path d="M300 360 Q300 310 315 270 Q322 250 330 240 L330 390 Q315 395 300 385 Z" fill="#1DD1A1" opacity="0.8"/>
  <!-- Head -->
  <circle cx="322" cy="228" r="22" fill="#1DD1A1"/>
  <!-- Namaste hands (folded in front) -->
  <path d="M310 280 Q318 265 322 258 Q326 265 334 280" fill="none" stroke="#1DD1A1" stroke-width="3" stroke-linecap="round"/>
  <path d="M314 275 L330 275" fill="none" stroke="#1DD1A1" stroke-width="2" opacity="0.6"/>
  <!-- Slightly bowed head -->

  <!-- Knowledge flow (dots from guru to sishya) -->
  <circle cx="250" cy="200" r="3" fill="#FDB813" opacity="0.8"/>
  <circle cx="262" cy="208" r="2.5" fill="#FDB813" opacity="0.6"/>
  <circle cx="273" cy="216" r="2" fill="#FDB813" opacity="0.5"/>
  <circle cx="283" cy="224" r="1.5" fill="#FDB813" opacity="0.4"/>

  <!-- Code brackets symbolizing tech education -->
  <text x="140" y="430" font-family="monospace" font-size="36" fill="#E85D26" opacity="0.7">&lt;</text>
  <text x="350" y="430" font-family="monospace" font-size="36" fill="#E85D26" opacity="0.7">/&gt;</text>

  <!-- Text: GURU SISHYA -->
  <text x="256" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" letter-spacing="4">
    <tspan fill="#E85D26">GURU</tspan>
    <tspan fill="#FDB813" dx="8">SISHYA</tspan>
  </text>

  <!-- Tagline -->
  <text x="256" y="445" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8B8B9E" letter-spacing="3">CRACK YOUR INTERVIEW</text>
</svg>
