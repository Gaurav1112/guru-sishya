<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64" fill="none">
  <defs>
    <linearGradient id="flameGradFull" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#E85D26"/>
      <stop offset="70%" stop-color="#FDB813"/>
    </linearGradient>
    <linearGradient id="leftArcFull" x1="0" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#E85D26" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E85D26"/>
    </linearGradient>
    <linearGradient id="rightArcFull" x1="1" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#FDB813" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FDB813"/>
    </linearGradient>
  </defs>

  <!-- ===== ICON (same as logo-mark) ===== -->

  <rect x="0" y="0" width="64" height="64" rx="14" fill="#0C0A15"/>

  <!-- Left arc — Guru -->
  <path
    d="M18 48 C18 38 20 30 26 24 C30 20 32 17 32 13"
    stroke="url(#leftArcFull)"
    stroke-width="3"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Right arc — Sishya -->
  <path
    d="M46 48 C46 38 44 30 38 24 C34 20 32 17 32 13"
    stroke="url(#rightArcFull)"
    stroke-width="3"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Central flame -->
  <path
    d="M32 18 C28.5 24 26 28 26 32 C26 35.3 28.7 38 32 38 C35.3 38 38 35.3 38 32 C38 28 35.5 24 32 18Z"
    fill="url(#flameGradFull)"
  />

  <!-- Inner flame -->
  <path
    d="M32 25 C30 28.5 29 30.5 29 32.5 C29 34.2 30.3 35.5 32 35.5 C33.7 35.5 35 34.2 35 32.5 C35 30.5 34 28.5 32 25Z"
    fill="#FDB813"
    opacity="0.9"
  />

  <!-- White core -->
  <ellipse cx="32" cy="32.5" rx="1.8" ry="2.2" fill="white" opacity="0.7"/>

  <!-- Teal spark -->
  <circle cx="32" cy="14" r="2" fill="#1DD1A1"/>

  <!-- Base platform -->
  <path
    d="M24 43 Q28 40 32 40 Q36 40 40 43"
    stroke="#E85D26"
    stroke-width="1.5"
    stroke-linecap="round"
    fill="none"
    opacity="0.4"
  />

  <!-- ===== TEXT — stacked layout ===== -->

  <!-- "GURU" in saffron, bold -->
  <text
    x="80"
    y="30"
    font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="22"
    font-weight="700"
    letter-spacing="4"
    fill="#E85D26"
  >GURU</text>

  <!-- "SISHYA" in gold, bold -->
  <text
    x="80"
    y="52"
    font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="22"
    font-weight="700"
    letter-spacing="4"
    fill="#FDB813"
  >SISHYA</text>

  <!-- Teal accent divider between the two words -->
  <line x1="80" y1="35" x2="168" y2="35" stroke="#1DD1A1" stroke-width="1" opacity="0.35"/>
</svg>
